<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — MarketHub</title>
    <link href="https://stackpath.bootstrapcdn.com/bootswatch/4.3.1/cosmo/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-uhut8PejFZO8994oEgm/ZfAv0mW1/b83nczZzSwElbeILxwkN491YQXsCFTE6+nx"
          crossorigin="anonymous">
</head>
<body>
<div class="container" style="padding-top: 5rem; text-align: center;">
    <h1 style="font-size: 6rem; font-weight: 700; color: #2780e3;">404</h1>
    <h2 class="mb-3">Page Not Found</h2>
    <p class="text-muted mb-4">
        The page <code th:text="${path}"></code> could not be found.
    </p>
    <a href="/onlinemarket/public/login" class="btn btn-primary mr-2">Go to Login</a>
    <a href="javascript:history.back()" class="btn btn-outline-secondary">Go Back</a>
</div>
</body>
</html>
