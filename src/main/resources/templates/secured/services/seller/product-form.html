<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>MarketHub — Edit Product</title>
</head>
<body>
<div layout:fragment="content" class="container" style="padding-top:2em;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="page-title mb-0">Edit Product <small class="text-muted" th:text="'SKU: ' + ${product.sku}"></small></h3>
        <a th:href="@{/onlinemarket/secured/services/products/my-products}" class="btn btn-outline-secondary">Cancel</a>
    </div>
    <hr/>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="post" th:action="@{/onlinemarket/secured/services/products/save-product}" th:object="${product}">
                        <input type="hidden" name="productId" th:value="${product.productId}"/>
                        <input type="hidden" name="seller" th:value="${product.seller?.userId}"/>
                        <div class="form-group">
                            <label for="sku">SKU</label>
                            <span th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}" class="text-danger small ml-2"></span>
                            <input id="sku" name="sku" type="text" class="form-control" th:value="${product.sku}" required autofocus/>
                        </div>
                        <div class="form-group">
                            <label for="name">Product Name</label>
                            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small ml-2"></span>
                            <input id="name" name="name" type="text" class="form-control" th:value="${product.name}" required/>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="price">Price ($)</label>
                                <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger small ml-2"></span>
                                <input id="price" name="price" type="number" step="0.01" min="0" class="form-control" th:value="${product.price}" required/>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="quantity">Quantity</label>
                                <span th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" class="text-danger small ml-2"></span>
                                <input id="quantity" name="quantity" type="number" min="0" class="form-control" th:value="${product.quantity}"/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-danger small ml-2"></span>
                            <input id="description" name="description" type="text" class="form-control" th:value="${product.description}" required/>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary">Update Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<th:block layout:fragment="footer"></th:block>
</body>
</html>
