<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>Edit Product</title>
</head>
<body>
<div layout:fragment="content" class="container">
    <div class="page-header d-flex align-items-start justify-content-between flex-wrap gap-3">
        <div>
            <h1 class="page-title">
                <i class="fa-solid fa-pen-to-square me-2 text-primary" style="font-size:1.2rem;"></i>Edit Product
                <small class="text-muted fw-normal fs-6" th:text="'— SKU: ' + ${product.sku}"></small>
            </h1>
            <p class="page-subtitle">Update the product details below.</p>
        </div>
        <a th:href="@{/onlinemarket/secured/services/products/my-products}" class="btn btn-outline-secondary btn-icon">
            <i class="fa-solid fa-xmark"></i>Cancel
        </a>
    </div>
    <hr class="section-divider"/>

    <div class="row">
        <div class="col-lg-7">
            <div class="form-card">
                <div class="card-body">
                    <form method="post" th:action="@{/onlinemarket/secured/services/products/save-product}" th:object="${product}">
                        <input type="hidden" name="productId" th:value="${product.productId}"/>
                        <input type="hidden" name="seller" th:value="${product.seller?.userId}"/>
                        <div class="mb-3">
                            <label for="sku" class="form-label">SKU <span class="text-danger">*</span></label>
                            <input id="sku" name="sku" type="text" class="form-control" th:value="${product.sku}" required autofocus/>
                            <span th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}" class="form-error-msg d-block"></span>
                        </div>
                        <div class="mb-3">
                            <label for="name" class="form-label">Product Name <span class="text-danger">*</span></label>
                            <input id="name" name="name" type="text" class="form-control" th:value="${product.name}" required/>
                            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="form-error-msg d-block"></span>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label for="price" class="form-label">Price (USD) <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input id="price" name="price" type="number" step="0.01" min="0.01"
                                           class="form-control" th:value="${product.price}" required/>
                                </div>
                                <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="form-error-msg d-block"></span>
                            </div>
                            <div class="col-6">
                                <label for="quantity" class="form-label">Quantity</label>
                                <input id="quantity" name="quantity" type="number" min="0"
                                       class="form-control" th:value="${product.quantity}"/>
                                <span th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" class="form-error-msg d-block"></span>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="description" class="form-label">Description <span class="text-danger">*</span></label>
                            <input id="description" name="description" type="text" class="form-control"
                                   th:value="${product.description}" required/>
                            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="form-error-msg d-block"></span>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/onlinemarket/secured/services/products/my-products}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary btn-icon">
                                <i class="fa-solid fa-floppy-disk"></i>Update Product
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
