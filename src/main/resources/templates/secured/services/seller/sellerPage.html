<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>My Products</title>
</head>
<body>
<div layout:fragment="content" class="container">
    <div class="page-header d-flex align-items-start justify-content-between flex-wrap gap-3">
        <div>
            <h1 class="page-title"><i class="fa-solid fa-store me-2 text-success" style="font-size:1.2rem;"></i>My Products</h1>
            <p class="page-subtitle" th:if="${products != null and products.size() > 0}"
               th:text="${products.size()} + ' product(s) listed'"></p>
        </div>
        <a th:href="@{/onlinemarket/secured/services/products/new-product}" class="btn btn-success btn-icon">
            <i class="fa-solid fa-plus"></i>Add Product
        </a>
    </div>
    <hr class="section-divider"/>

    <div th:if="${products != null and products.size() > 0}" class="mh-table">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>#</th>
                <th>SKU</th>
                <th>Name</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Description</th>
                <th style="width:140px;"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product,stat : ${products}">
                <td class="text-muted" th:text="${stat.count}"></td>
                <td><code style="font-size:0.8rem;" th:text="${product.sku}"></code></td>
                <td class="fw-semibold" th:text="${product.name}"></td>
                <td class="fw-bold text-primary" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></td>
                <td>
                    <span class="badge" th:classappend="${product.quantity > 0} ? 'bg-success' : 'bg-danger'"
                          th:text="${product.quantity}"></span>
                </td>
                <td class="text-muted" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                    th:text="${product.description}"></td>
                <td>
                    <div class="d-flex gap-2">
                        <a th:href="@{|/onlinemarket/secured/services/products/update-product/${product.productId}|}"
                           class="btn btn-sm btn-outline-primary btn-icon">
                            <i class="fa-solid fa-pen"></i>Edit
                        </a>
                        <a th:href="@{|/onlinemarket/secured/services/products/delete/${product.productId}|}"
                           class="btn btn-sm btn-outline-danger btn-icon"
                           onclick="return confirm('Delete this product? This action cannot be undone.')">
                            <i class="fa-solid fa-trash"></i>Delete
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${products == null or products.size() == 0}" class="empty-state">
        <i class="fa-solid fa-box-open d-block"></i>
        <h5>No products yet</h5>
        <p>Add your first product to start selling.</p>
        <a th:href="@{/onlinemarket/secured/services/products/new-product}" class="btn btn-success btn-icon">
            <i class="fa-solid fa-plus"></i>Add First Product
        </a>
    </div>
</div>
</body>
</html>
