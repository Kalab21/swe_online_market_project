<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>MarketHub — My Products</title>
</head>
<body>
<div layout:fragment="content" class="container" style="padding-top:2em;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="page-title mb-0">My Products</h3>
        <a th:href="@{/onlinemarket/secured/services/products/new-product}" class="btn btn-success">+ Add Product</a>
    </div>
    <hr/>

    <div th:if="${products != null and products.size() > 0}">
        <table class="table table-striped table-hover">
            <thead>
            <tr>
                <th>#</th>
                <th>SKU</th>
                <th>Name</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Description</th>
                <th colspan="2"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product,stat : ${products}">
                <td th:text="${stat.count}"></td>
                <td th:text="${product.sku}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="'$' + ${product.price}"></td>
                <td th:text="${product.quantity}"></td>
                <td th:text="${product.description}"></td>
                <td>
                    <a th:href="@{|/onlinemarket/secured/services/products/update-product/${product.productId}|}"
                       class="btn btn-sm btn-outline-primary">Edit</a>
                </td>
                <td>
                    <a th:href="@{|/onlinemarket/secured/services/products/delete/${product.productId}|}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Delete this product?')">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${products == null or products.size() == 0}" class="alert alert-info">
        No products yet. <a th:href="@{/onlinemarket/secured/services/products/new-product}">Add your first product.</a>
    </div>
</div>
<th:block layout:fragment="footer"></th:block>
</body>
</html>
