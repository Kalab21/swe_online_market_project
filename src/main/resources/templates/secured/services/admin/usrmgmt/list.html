<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>User Management</title>
</head>
<body>
<div layout:fragment="content" class="container">
    <div class="page-header d-flex align-items-start justify-content-between flex-wrap gap-3">
        <div>
            <h1 class="page-title"><i class="fa-solid fa-users-gear me-2 text-danger" style="font-size:1.2rem;"></i>User Management</h1>
            <p class="page-subtitle">Review all registered users and manage seller approvals.</p>
        </div>
        <a th:href="@{/onlinemarket/secured/services}" class="btn btn-outline-secondary btn-icon">
            <i class="fa-solid fa-arrow-left"></i>Dashboard
        </a>
    </div>
    <hr class="section-divider"/>

    <div class="mh-table">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>#</th>
                <th>Username</th>
                <th>Name</th>
                <th>Email</th>
                <th>Seller Approved</th>
                <th style="width:140px;"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user,stat : ${sellers}">
                <td class="text-muted" th:text="${stat.count}"></td>
                <td class="fw-semibold" th:text="${user.userName}"></td>
                <td th:text="${user.firstName} + ' ' + ${user.lastName}"></td>
                <td class="text-muted" th:text="${user.email}"></td>
                <td>
                    <span th:if="${user.approvedSeller}" class="badge bg-success">
                        <i class="fa-solid fa-check me-1"></i>Approved
                    </span>
                    <span th:unless="${user.approvedSeller}" class="badge bg-secondary">
                        <i class="fa-solid fa-clock me-1"></i>Pending
                    </span>
                </td>
                <td>
                    <a th:if="${!user.approvedSeller}"
                       th:href="@{|/onlinemarket/secured/services/users/update/${user.userId}|}"
                       class="btn btn-sm btn-success btn-icon">
                        <i class="fa-solid fa-user-check"></i>Approve
                    </a>
                </td>
            </tr>
            <tr th:if="${sellers == null or sellers.size() == 0}">
                <td colspan="6">
                    <div class="empty-state py-3">
                        <i class="fa-solid fa-users d-block" style="font-size:2rem;color:#CBD5E1;"></i>
                        <p class="mb-0">No users found.</p>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
