<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>MarketHub — User Management</title>
</head>
<body>
<div layout:fragment="content" class="container" style="padding-top:2em;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="page-title mb-0">User Management</h3>
        <a th:href="@{/onlinemarket/secured/services}" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>
    <hr/>

    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>#</th>
            <th>Username</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Approved Seller</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user,stat : ${sellers}">
            <td th:text="${stat.count}"></td>
            <td th:text="${user.userName}"></td>
            <td th:text="${user.firstName}"></td>
            <td th:text="${user.lastName}"></td>
            <td th:text="${user.email}"></td>
            <td>
                <span th:if="${user.approvedSeller}" class="badge badge-success">Yes</span>
                <span th:unless="${user.approvedSeller}" class="badge badge-secondary">No</span>
            </td>
            <td>
                <a th:if="${!user.approvedSeller}"
                   th:href="@{|/onlinemarket/secured/services/users/update/${user.userId}|}"
                   class="btn btn-sm btn-success">Approve Seller</a>
            </td>
        </tr>
        <tr th:if="${sellers == null or sellers.size() == 0}">
            <td colspan="8" class="text-center text-muted">No users found.</td>
        </tr>
        </tbody>
    </table>
</div>
<th:block layout:fragment="footer"></th:block>
</body>
</html>
