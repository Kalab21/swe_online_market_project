<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>MarketHub — Shopping Cart</title>
</head>
<body>
<div layout:fragment="content" class="container" style="padding-top:2em;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="page-title mb-0">Shopping Cart</h3>
        <a th:href="@{/onlinemarket/secured/services/products/list}" class="btn btn-outline-primary">Continue Shopping</a>
    </div>
    <hr/>

    <div th:if="${shoppingCart.products.size() > 0}">
        <table class="table table-striped table-hover">
            <thead>
            <tr>
                <th>#</th>
                <th>SKU</th>
                <th>Name</th>
                <th>Price</th>
                <th>Description</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product,stat : ${shoppingCart.products}">
                <td th:text="${stat.count}"></td>
                <td th:text="${product.sku}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="'$' + ${product.price}"></td>
                <td th:text="${product.description}"></td>
                <td>
                    <a th:href="@{|/onlinemarket/cart/${shoppingCart.cartId}/delete/${product.productId}|}"
                       class="btn btn-sm btn-outline-danger">Remove</a>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="card mt-3">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-0">Order Total:
                        <strong th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></strong>
                    </h5>
                    <small class="text-muted" th:text="${shoppingCart.products.size()} + ' item(s)'"></small>
                </div>
                <a th:href="@{|/onlinemarket/cart/${shoppingCart.cartId}/checkout/${currentUser.userId}|}"
                   class="btn btn-success btn-lg">Checkout</a>
            </div>
        </div>
    </div>

    <div th:if="${shoppingCart.products.size() == 0}" class="alert alert-info">
        Your cart is empty. <a th:href="@{/onlinemarket/secured/services/products/list}">Browse products.</a>
    </div>
</div>
<th:block layout:fragment="footer"></th:block>
</body>
</html>
