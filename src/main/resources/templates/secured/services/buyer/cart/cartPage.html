<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>Shopping Cart</title>
</head>
<body>
<div layout:fragment="content" class="container">
    <div class="page-header d-flex align-items-start justify-content-between flex-wrap gap-3">
        <div>
            <h1 class="page-title"><i class="fa-solid fa-cart-shopping me-2 text-primary" style="font-size:1.2rem;"></i>Shopping Cart</h1>
            <p class="page-subtitle" th:if="${shoppingCart.products.size() > 0}"
               th:text="${shoppingCart.products.size()} + ' item(s) in your cart'"></p>
        </div>
        <a th:href="@{/onlinemarket/secured/services/products/list}" class="btn btn-outline-primary btn-icon">
            <i class="fa-solid fa-arrow-left"></i>Continue Shopping
        </a>
    </div>
    <hr class="section-divider"/>

    <div th:if="${shoppingCart.products.size() > 0}" class="row g-4">
        <!-- Cart Items -->
        <div class="col-lg-8">
            <div th:each="product,stat : ${shoppingCart.products}" class="cart-item">
                <div class="cart-item-icon">
                    <i class="fa-solid fa-box"></i>
                </div>
                <div class="cart-item-info">
                    <div class="cart-item-name" th:text="${product.name}"></div>
                    <div class="cart-item-sku" th:text="'SKU: ' + ${product.sku}"></div>
                </div>
                <div class="cart-item-price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></div>
                <a th:href="@{|/onlinemarket/cart/${shoppingCart.cartId}/delete/${product.productId}|}"
                   class="btn btn-sm btn-outline-danger btn-icon ms-2"
                   title="Remove item">
                    <i class="fa-solid fa-trash"></i>
                </a>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="col-lg-4">
            <div class="cart-summary">
                <h6 class="fw-bold mb-3" style="font-size:0.8125rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--mh-muted);">
                    <i class="fa-solid fa-receipt me-2"></i>Order Summary
                </h6>
                <div class="d-flex justify-content-between text-muted small mb-2">
                    <span>Subtotal (<span th:text="${shoppingCart.products.size()}"></span> item(s))</span>
                    <span th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
                </div>
                <div class="d-flex justify-content-between text-muted small mb-3">
                    <span>Shipping</span>
                    <span class="text-success fw-semibold">Free</span>
                </div>
                <hr style="border-color:var(--mh-border);"/>
                <div class="cart-total-row mb-4">
                    <span class="cart-total-label">Total</span>
                    <span class="cart-total-amount" th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
                </div>
                <a th:href="@{|/onlinemarket/cart/${shoppingCart.cartId}/checkout/${currentUser.userId}|}"
                   class="btn btn-primary btn-lg w-100 btn-icon">
                    <i class="fa-solid fa-lock"></i>Proceed to Checkout
                </a>
            </div>
        </div>
    </div>

    <!-- Empty Cart -->
    <div th:if="${shoppingCart.products.size() == 0}" class="empty-state">
        <i class="fa-solid fa-cart-shopping d-block"></i>
        <h5>Your cart is empty</h5>
        <p>Looks like you haven't added anything yet.</p>
        <a th:href="@{/onlinemarket/secured/services/products/list}" class="btn btn-primary btn-icon">
            <i class="fa-solid fa-boxes-stacked"></i>Browse Products
        </a>
    </div>
</div>
</body>
</html>
