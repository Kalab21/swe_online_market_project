<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>My Orders</title>
</head>
<body>
<div layout:fragment="content" class="container">
    <div class="page-header">
        <h1 class="page-title">
            <i class="fa-solid fa-receipt me-2 text-primary" style="font-size:1.2rem;"></i>My Orders
        </h1>
        <p class="page-subtitle">Track the status of your placed orders.</p>
    </div>
    <hr class="section-divider"/>

    <div th:if="${orders != null and !orders.isEmpty()}">
        <div class="table-responsive">
            <table class="table mh-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="o, iterStat : ${orders}">
                        <td th:text="${iterStat.count}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${o.orderStatus == 'Pending'} ? 'bg-warning text-dark' : 'bg-success'"
                                  th:text="${o.orderStatus}"></span>
                        </td>
                        <td th:text="${o.createdAt}"></td>
                        <td th:text="'$' + ${#numbers.formatDecimal(o.price, 1, 2)}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${orders == null or orders.isEmpty()}" class="empty-state">
        <i class="fa-solid fa-receipt d-block"></i>
        <h5>No orders yet</h5>
        <p>Add products to your cart and check out to place your first order.</p>
        <a href="/onlinemarket/secured/services/products/list" class="btn btn-primary btn-icon mt-2">
            <i class="fa-solid fa-boxes-stacked"></i>Browse Products
        </a>
    </div>
</div>
</body>
</html>
