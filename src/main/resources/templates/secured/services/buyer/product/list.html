<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/master-layout}">
<head>
    <title>MarketHub — Products</title>
</head>
<body>
<div layout:fragment="content" class="container" style="padding-top:2em;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="page-title mb-0">Products</h3>
        <a th:href="@{/onlinemarket/cart/me}" class="btn btn-outline-success">View Cart</a>
    </div>
    <hr/>

    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>#</th>
            <th>SKU</th>
            <th>Name</th>
            <th>Price</th>
            <th>Description</th>
            <th>Qty</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product,iterStat : ${products.content}">
            <td th:text="${products.number * products.size + iterStat.count}"></td>
            <td th:text="${product.sku}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="'$' + ${product.price}"></td>
            <td th:text="${product.description}"></td>
            <td th:text="${product.quantity}"></td>
            <td>
                <a th:href="@{|/onlinemarket/cart/${currentUser.shoppingCart?.cartId}/addproduct/${product.productId}|}"
                   class="btn btn-sm btn-success">Add to Cart</a>
            </td>
        </tr>
        <tr th:if="${products.totalElements == 0}">
            <td colspan="7" class="text-center text-muted">No products available.</td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${products.totalPages > 1}" aria-label="Product pages">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                <a class="page-link" th:href="@{/onlinemarket/secured/services/products/list(page=${products.number - 1}, size=${products.size})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                th:classappend="${i == products.number} ? 'active'">
                <a class="page-link" th:href="@{/onlinemarket/secured/services/products/list(page=${i}, size=${products.size})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                <a class="page-link" th:href="@{/onlinemarket/secured/services/products/list(page=${products.number + 1}, size=${products.size})}">Next</a>
            </li>
        </ul>
    </nav>
    <p class="text-center text-muted small" th:if="${products.totalElements > 0}"
       th:text="|Showing ${products.number * products.size + 1}–${products.number * products.size + products.numberOfElements} of ${products.totalElements} products|"></p>
</div>
<th:block layout:fragment="footer"></th:block>
</body>
</html>
